name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create local.properties
        run: |
          mkdir -p android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      # ✅ تثبيت Gradle 8.6 يدوياً
      - name: Install Gradle 8.6
        run: |
          wget https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle-8.6.zip
          unzip -q /tmp/gradle-8.6.zip -d /tmp/
          echo "/tmp/gradle-8.6/bin" >> $GITHUB_PATH

      # ✅ توليد wrapper باستخدام Gradle 8.6
      - name: Setup Gradle wrapper
        run: |
          rm -rf android/gradle/wrapper/gradle-wrapper.jar
          rm -f android/gradlew
          cd android
          /tmp/gradle-8.6/bin/gradle wrapper --gradle-version 8.6 --no-daemon
          cd ..
          chmod +x android/gradlew

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kids-learning-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
